name: Build Custom Geosite

on:
  workflow_dispatch:
    inputs:
      refresh_remote_lists:
        description: "Fetch ulang list remote (oisd, adaway, phishing, dll)"
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Prepare scripts
        shell: bash
        run: |
          chmod +x add_custom.sh line.sh

          # Patch path absolut VPS -> path runner GitHub Actions
          sed -i "s|^BASE_DIR=.*|BASE_DIR=\"${GITHUB_WORKSPACE}\"|" add_custom.sh
          sed -i "s|^directory=.*|directory=\"${GITHUB_WORKSPACE}/my-custom/\"|" line.sh

          echo "=== add_custom.sh (patched) ==="
          grep -nE '^(BASE_DIR|CUSTOM_DIR|DATA_DIR|CATEGORY_FILE)' add_custom.sh || true
          echo "=== line.sh (patched) ==="
          grep -nE '^directory=' line.sh || true

      - name: Build dlc binary
        run: |
          go build -v -o dlc .

      - name: Run custom geosite build
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.refresh_remote_lists }}" == "true" ]]; then
            sed -i 's/^# run_download$/run_download/' add_custom.sh
            echo "Remote list refresh: ENABLED"
          else
            echo "Remote list refresh: DISABLED"
          fi

          bash add_custom.sh

      - name: Verify outputs
        shell: bash
        run: |
          test -f release/geosite.dat
          ls -lh release/geosite.dat
          sha256sum release/geosite.dat

      - name: Upload geosite artifact
        uses: actions/upload-artifact@v4
        with:
          name: geosite-dat
          path: |
            release/geosite.dat
            category
          if-no-files-found: error